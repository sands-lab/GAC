experiments:
  TOKENEVICTION_prefill_gemm_m_real_shapes:
    type: gemm_m_dense
    dtypes: [fp16, bf16]
    shape: {K: 4096, N: 4096}
    M_values:
      - 255
      - 256
      - 257
      - 511
      - 512
      - 513
      - 1023
      - 1024
      - 1025
      - 2047
      - 2048
      - 2049
      - 4095
      - 4096
      - 4097
      - 8191
      - 8192
      - 8193
    warmup: 50
    measure: 200
    trials: 3
    provenance:
      method: token_eviction
      aliases:
        - H2O
        - PyramidKV
        - SnapKV
      stage: prefill
      operator_family: GEMM
      changed_axis: M
      sources:
        - notes/operator_impact_map.md
        - notes/full_paper_plan.md
        - notes/paper_plan.md
        - scripts/profile_alignment.py
        - scripts/create_paper_figures.py
      rationale: >
        Sweep explicit sequence-driven M checkpoints across the common long-context
        boundaries that token-eviction methods perturb, so the next attribution run can
        test sequence-length-sensitive GEMM behavior without falling back to the old toy
        dense-sweep window.

  TOKENEVICTION_decode_sdpa_context_real_shapes:
    type: sdpa_dense
    dtype: fp16
    shapes:
      - {batch: 1, seq_len: 255, n_heads: 32}
      - {batch: 1, seq_len: 256, n_heads: 32}
      - {batch: 1, seq_len: 257, n_heads: 32}
      - {batch: 1, seq_len: 511, n_heads: 32}
      - {batch: 1, seq_len: 512, n_heads: 32}
      - {batch: 1, seq_len: 513, n_heads: 32}
      - {batch: 1, seq_len: 1023, n_heads: 32}
      - {batch: 1, seq_len: 1024, n_heads: 32}
      - {batch: 1, seq_len: 1025, n_heads: 32}
      - {batch: 1, seq_len: 2047, n_heads: 32}
      - {batch: 1, seq_len: 2048, n_heads: 32}
      - {batch: 1, seq_len: 2049, n_heads: 32}
    head_dim_range: [128, 128]
    head_dim_step_1: 1
    warmup: 50
    measure: 200
    trials: 3
    provenance:
      method: token_eviction
      aliases:
        - H2O
        - PyramidKV
        - SnapKV
      stage: decode
      operator_family: SDPA
      changed_axis: context_length
      sources:
        - notes/operator_impact_map.md
        - notes/full_paper_plan.md
        - notes/paper_plan.md
        - Latex/main.tex
      rationale: >
        Hold head_dim fixed at an aligned 128 and only vary context length, so the next
        decode-side token-eviction run isolates sequence-length-driven attention cost
        instead of re-opening the head_dim alignment story.
